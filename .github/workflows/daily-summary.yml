name: Daily Telegram Summary

on:
  schedule:
    # Every 2 days at 06:15 UTC (09:15 Europe/Minsk) — offset from :00 to avoid peak load
    - cron: '15 6 */2 * *'
  workflow_dispatch:

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily summary
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          TELEGRAM_GROUP: ${{ secrets.TELEGRAM_GROUP }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          YANDEX_CLOUD_API_KEY: ${{ secrets.YANDEX_CLOUD_API_KEY }}
          YANDEX_CLOUD_FOLDER_ID: ${{ secrets.YANDEX_CLOUD_FOLDER_ID }}
          YANDEXGPT_MODEL: ${{ vars.YANDEXGPT_MODEL }}
          TIMEZONE: ${{ vars.TIMEZONE }}
        run: python scripts/daily_summary.py
